<!DOCTYPE html>
<html>
<head>

<title>Free Chess Game Analyzer</title>

<style>

body{
font-family:Arial;
padding:40px;
}

#board{
width:400px;
height:400px;
display:grid;
grid-template-columns:repeat(8,1fr);
border:2px solid black;
}

.square{
width:50px;
height:50px;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
}

.light{
background:#f0d9b5;
}

.dark{
background:#b58863;
}

textarea{
margin-top:20px;
width:400px;
height:120px;
}

button{
margin-top:10px;
padding:10px;
font-size:16px;
}

</style>

</head>

<body>

<h1>Free Chess Game Analyzer</h1>

<div id="board"></div>

<p>Paste PGN from chess.com:</p>

<textarea id="pgn"></textarea>

<br>

<button onclick="loadGame()">Load Game</button>

<script>

const board = document.getElementById("board")

const startPosition = [
"♜","♞","♝","♛","♚","♝","♞","♜",
"♟","♟","♟","♟","♟","♟","♟","♟",
"","","","","","","","",
"","","","","","","","",
"","","","","","","","",
"","","","","","","","",
"♙","♙","♙","♙","♙","♙","♙","♙",
"♖","♘","♗","♕","♔","♗","♘","♖"
]

function drawBoard(){

board.innerHTML=""

for(let i=0;i<64;i++){

const square=document.createElement("div")

square.classList.add("square")

const row=Math.floor(i/8)
const col=i%8

if((row+col)%2==0){
square.classList.add("light")
}else{
square.classList.add("dark")
}

square.textContent=startPosition[i]

board.appendChild(square)

}

}

function loadGame(){

alert("PGN received! Analysis coming in next version.")

}

drawBoard()

</script>

</body>
</html>
