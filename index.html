<!DOCTYPE html>
<html>
<head>

<title>Chess Analyzer</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/chessboard.js/1.0.0/chessboard.min.css"/>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard.js/1.0.0/chessboard.min.js"></script>

<style>

body{
font-family:Arial;
background:#1f1f1f;
color:white;
display:flex;
justify-content:center;
padding-top:40px;
}

.container{
display:flex;
gap:40px;
}

#board{
width:450px;
}

.panel{
width:300px;
}

textarea{
width:100%;
height:150px;
background:#2c2c2c;
color:white;
border:none;
padding:10px;
}

button{
margin-top:10px;
padding:12px;
width:100%;
background:#4CAF50;
color:white;
border:none;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#45a049;
}

h1{
text-align:center;
margin-bottom:20px;
}

</style>

</head>

<body>

<div class="container">

<div>
<h1>Chess Analyzer</h1>
<div id="board"></div>
</div>

<div class="panel">

<p>Paste PGN from chess.com:</p>

<textarea id="pgn"></textarea>

<button onclick="loadGame()">Load Game</button>

</div>

</div>

<script>

var board
var game

$(document).ready(function(){

game = new Chess()

board = Chessboard('board',{
position:'start'
})

})

function loadGame(){

var pgn = document.getElementById("pgn").value

game.load_pgn(pgn)

board.position(game.fen())

}

</script>

</body>
</html>
