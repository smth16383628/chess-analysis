<!DOCTYPE html>
<html>

<head>

<title>Free Chess Analyzer</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/chessboard.js/1.0.0/chessboard.min.css"/>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard.js/1.0.0/chessboard.min.js"></script>

<style>

body{
font-family: Arial;
padding:40px;
}

#board{
width:400px;
margin-bottom:20px;
}

textarea{
width:500px;
height:150px;
}

button{
padding:10px 20px;
font-size:16px;
}

</style>

</head>

<body>

<h1>Free Chess Game Analyzer</h1>

<div id="board"></div>

<p>Paste your PGN:</p>

<textarea id="pgn"></textarea>

<br><br>

<button onclick="loadGame()">Load Game</button>

<script>

var board
var game

$(document).ready(function(){

game = new Chess()

board = Chessboard('board',{
position:'start'
})

})

function loadGame(){

var pgn = document.getElementById("pgn").value

game.load_pgn(pgn)

board.position(game.fen())

}

</script>

</body>

</html>
