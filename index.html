<!DOCTYPE html>
<html>
<head>

<title>Chess Analyzer</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.13.4/chess.min.js"></script>

<style>

body{
font-family:Arial;
padding:40px;
}

#board{
width:400px;
height:400px;
display:grid;
grid-template-columns:repeat(8,1fr);
border:2px solid black;
}

.square{
width:50px;
height:50px;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
}

.light{background:#f0d9b5;}
.dark{background:#b58863;}

textarea{
margin-top:20px;
width:400px;
height:120px;
}

button{
margin-top:10px;
padding:10px;
margin-right:5px;
}

</style>

</head>

<body>

<h1>Chess Analyzer</h1>

<div id="board"></div>

<p>Paste PGN:</p>

<textarea id="pgn"></textarea>
<br>

<button onclick="loadGame()">Load Game</button>
<button onclick="nextMove()">Next Move</button>

<script>

const chess = new Chess()
const board = document.getElementById("board")

let moves=[]
let moveIndex=0

const pieceSymbols={
p:"♟",r:"♜",n:"♞",b:"♝",q:"♛",k:"♚",
P:"♙",R:"♖",N:"♘",B:"♗",Q:"♕",K:"♔"
}

function drawBoard(){

board.innerHTML=""

const state = chess.board()

for(let r=0;r<8;r++){

for(let c=0;c<8;c++){

let square=document.createElement("div")

square.className="square"

if((r+c)%2==0) square.classList.add("light")
else square.classList.add("dark")

let piece = state[r][c]

if(piece){
let symbol = pieceSymbols[
piece.color==="w" ? piece.type.toUpperCase() : piece.type
]
square.textContent = symbol
}

board.appendChild(square)

}

}

}

function loadGame(){

chess.reset()

let pgn=document.getElementById("pgn").value

chess.load_pgn(pgn)

moves = chess.history()

moveIndex = 0

chess.reset()

drawBoard()

}

function nextMove(){

if(moveIndex>=moves.length) return

chess.move(moves[moveIndex])

moveIndex++

drawBoard()

}

drawBoard()

</script>

</body>
</html>
